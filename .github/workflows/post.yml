name: Bot Barre de Progression FR

on:
  schedule:
    - cron: "0 */3 * * *"   # toutes les 3 heures, ajustable
  workflow_dispatch: {}      # permet aussi un lancement manuel depuis l'onglet Actions

permissions:
  contents: write

jobs:
  poster:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python progress_bar_fr.py

      - name: Sauvegarder l'état dans le dépôt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etat.json
          git diff --cached --quiet || git commit -m "Mise à jour de l'état du bot"
          git push
